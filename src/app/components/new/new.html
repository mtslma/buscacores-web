<div
  class="min-h-[80vh] flex items-center justify-center animate-in fade-in slide-in-from-bottom-4 duration-700"
>
  <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md">
    <div class="text-center mb-8 relative">
      <h2 class="text-3xl font-extrabold text-slate-800">Criar Nova Paleta</h2>
      <p class="text-slate-500 mt-2">Defina o nome e a cor base da sua coleção.</p>

      <button
        routerLink="/explore"
        class="absolute -top-2 -right-2 text-slate-400 cursor-pointer hover:text-pink-600 transition-colors text-xs font-bold"
      >
        Cancelar
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Nome da Paleta</label>
        <input
          formControlName="name"
          type="text"
          placeholder="Ex: FIAP Colors"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition-all text-base font-medium"
        />
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Cor de Origem</label>
        <div class="flex items-center gap-4 p-4 rounded-xl border border-slate-100 bg-slate-50/50">
          <div
            class="w-14 h-14 rounded-xl cursor-pointer shadow-sm border-2 border-white transition-transform hover:scale-105 active:scale-95 shrink-0"
            [style.backgroundColor]="form.value.hex"
            [(colorPicker)]="form.getRawValue().hex"
            (colorPickerChange)="form.patchValue({ hex: $event })"
            [cpPosition]="'bottom'"
            [cpOKButton]="true"
            [cpSaveClickOutside]="true"
            [cpOKButtonText]="'Confirmar'"
            [cpOKButtonClass]="'bg-pink-600 text-white text-[10px] px-2 py-1 rounded'"
            [cpPresetColors]="['#db2777', '#7c3aed', '#2563eb', '#059669']"
          ></div>
          <div class="flex-1">
            <p class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1">
              HEX Selecionado
            </p>
            <p class="font-mono text-xl font-black text-slate-700 uppercase tracking-tighter">
              {{ form.value.hex }}
            </p>
            <p class="text-[10px] text-pink-500 font-medium italic leading-none">
              Toque para trocar
            </p>
          </div>
        </div>
      </div>

      <div
        class="flex items-center justify-between p-4 rounded-xl border border-slate-100 bg-slate-50/50"
      >
        <div class="flex items-center gap-3">
          <lucide-icon
            [img]="form.value.isPublic ? icons.globe : icons.lock"
            [size]="18"
            [class]="form.value.isPublic ? 'text-pink-500' : 'text-slate-400'"
          ></lucide-icon>
          <span class="text-sm font-bold text-slate-700">Tornar Pública</span>
        </div>
        <input
          type="checkbox"
          formControlName="isPublic"
          class="w-5 h-5 accent-pink-600 cursor-pointer"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid"
        class="w-full bg-pink-600 hover:bg-pink-700 disabled:bg-slate-300 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-pink-200 flex items-center justify-center gap-2"
      >
        <lucide-icon [img]="icons.save" [size]="18" *ngIf="!form.invalid"></lucide-icon>
        Criar Agora
      </button>
    </form>
  </div>
</div>
