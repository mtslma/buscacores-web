<div class="max-w-7xl mx-auto p-4">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-2xl font-bold text-slate-800">Explorar Paletas</h2>

    <select
      (change)="changeSort($event)"
      class="bg-white border border-slate-200 text-slate-600 text-sm rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-pink-500 cursor-pointer font-medium shadow-sm"
    >
      <option value="createdAt,desc">Mais Recentes</option>
      <option value="likesCount,desc">Mais Curtidas</option>
      <option value="name,asc">Nome (A-Z)</option>
      <option value="name,desc">Nome (Z-A)</option>
    </select>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (p of palettes(); track p.id) {
      <app-palette-card [palette]="p" />
    } @empty {
      <div
        class="col-span-full flex flex-col items-center justify-center py-20 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200"
      >
        <div
          class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400 mb-4"
        >
          <lucide-icon [img]="icons.palette" [size]="32"></lucide-icon>
        </div>
        <h3 class="text-lg font-bold text-slate-700">Nenhuma paleta encontrada</h3>
        <p class="text-slate-500 text-sm max-w-xs text-center mt-2">
          Parece que ainda não há paletas públicas por aqui. Que tal criar a primeira?
        </p>
        <button
          routerLink="/new"
          class="hover:cursor-pointer mt-6 px-6 py-2 bg-pink-600 text-white rounded-xl font-bold text-sm hover:bg-pink-700 transition-all shadow-lg shadow-pink-100"
        >
          Criar Nova Paleta
        </button>
      </div>
    }
  </div>
</div>
