<div class="min-h-[80vh] flex items-center justify-center animate-in fade-in zoom-in duration-500">
  <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Crie sua conta</h2>
      <p class="text-slate-500 mt-2 text-sm font-medium">
        Cadastre-se para começar a criar suas paletas.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Usuário</label>
        <input
          formControlName="username"
          type="text"
          placeholder="Escolha um nome de usuário"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition-all font-medium"
        />
        @if (form.controls.username.touched && form.controls.username.invalid) {
          <p class="text-[10px] text-pink-500 mt-1 ml-1 font-bold">Mínimo de 3 caracteres.</p>
        }
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Senha</label>
        <input
          formControlName="password"
          type="password"
          placeholder="No mínimo 6 caracteres"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-pink-500 focus:ring-2 focus:ring-pink-200 outline-none transition-all font-medium"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <p class="text-[10px] text-pink-500 mt-1 ml-1 font-bold">Mínimo de 6 caracteres.</p>
        }
      </div>

      <div class="space-y-4 pt-2">
        <button
          type="submit"
          [disabled]="form.invalid"
          class="w-full bg-pink-600 hover:bg-pink-700 disabled:bg-slate-300 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-pink-200"
        >
          Criar conta
        </button>

        <p class="text-center text-sm text-slate-500 font-medium">
          Já tem uma conta?
          <a
            routerLink="/login"
            class="text-pink-600 hover:text-pink-700 font-bold transition-colors underline-offset-4 hover:underline"
          >
            Faça login
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
