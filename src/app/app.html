<nav
  class="flex items-center justify-between px-10 py-5 bg-white/80 backdrop-blur-md fixed top-0 left-0 right-0 z-50 border-b border-slate-100 shadow-sm h-18"
>
  <div class="flex items-center gap-3 group cursor-pointer" routerLink="/">
    <div
      class="w-11 h-11 bg-pink-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-pink-200 group-hover:rotate-12 transition-transform duration-300"
    >
      <lucide-icon [img]="icons.palette" [size]="24"></lucide-icon>
    </div>

    <div class="flex flex-col">
      <span class="text-xl font-extrabold text-slate-800 leading-none tracking-tight">
        Busca Cores
      </span>
    </div>
  </div>

  <ul class="flex items-center gap-6">
    <li>
      <a
        routerLink="/explore"
        routerLinkActive="text-pink-600 font-bold bg-pink-50"
        class="flex items-center gap-2 text-sm px-4 py-2 rounded-full text-slate-500 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200"
      >
        <lucide-icon [img]="icons.telescope" [size]="18"></lucide-icon>
        Explorar
      </a>
    </li>

    @if (!authService.isLoggedIn()) {
      <li>
        <a
          routerLink="/login"
          routerLinkActive="text-pink-600 font-bold bg-pink-50"
          class="flex items-center gap-2 text-sm px-4 py-2 rounded-full text-slate-500 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200"
        >
          <lucide-icon [img]="icons.user" [size]="18"></lucide-icon>
          Fazer Login
        </a>
      </li>
    } @else {
      <li>
        <a
          routerLink="/new"
          routerLinkActive="text-pink-600 font-bold bg-pink-50"
          class="flex items-center gap-2 text-sm px-4 py-2 rounded-full text-slate-500 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200"
        >
          <lucide-icon [img]="icons.plus" [size]="18"></lucide-icon>
          Nova Paleta
        </a>
      </li>
      <li>
        <a
          routerLink="/profile"
          routerLinkActive="text-pink-600 font-bold bg-pink-50"
          class="flex items-center gap-2 text-sm px-4 py-2 rounded-full text-slate-500 hover:text-pink-600 hover:bg-pink-50 transition-all duration-200"
        >
          <lucide-icon [img]="icons.palette" [size]="18"></lucide-icon>
          Minhas Criações
        </a>
      </li>
      <li>
        <button
          (click)="handleLogout()"
          class="flex items-center gap-2 text-sm px-4 py-2 rounded-full text-slate-500 hover:text-red-600 hover:bg-red-50 transition-all duration-200 font-semibold"
        >
          <lucide-icon [img]="icons.logout" [size]="18"></lucide-icon>
          Sair
        </button>
      </li>
    }
  </ul>
</nav>

<main class="max-w-7xl mx-auto p-8 pt-24 animate-in fade-in duration-700 min-h-screen">
  <router-outlet />
</main>

<app-toast />
